<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>计划外普查任务详情</title><link rel="stylesheet" href="area-survey-outplan.css"></head><body>
<header class="topbar"><div class="topbar-left"><span class="brand-mark">普</span><span class="system-name">面积普查与检查管理系统</span></div><div class="topbar-right"><select class="role-select"><option>业务管理员</option><option>管理部</option></select><span class="env-badge">演示环境</span><div class="user"><span class="avatar">业</span><span>业务管理员</span><span>⌄</span></div></div></header>
<aside class="sider"><nav class="menu"><section><div class="menu-group-title"><span class="menu-icon">▦</span><span>面积普查</span><span class="menu-badge">7</span><span class="menu-arrow">⌄</span></div><a class="menu-item" href="area-survey-plan-list.html">面积普查任务管理</a><a class="menu-item selected" href="area-survey-outplan-list.html">计划外普查任务管理</a><a class="menu-item" href="area-survey-outplan-tasks.html">计划外普查任务</a><a class="menu-item" href="area-survey-station-details.html">面积普查站点明细</a><a class="menu-item" href="area-survey-offnetwork-stats.html">未在网建筑物统计</a><a class="menu-item" href="area-survey-office-tasks.html">我的面积普查任务（片区所）</a><a class="menu-item" href="area-survey-surveyor-tasks.html">我的面积普查任务（普查人员）</a></section><section><div class="menu-group-title"><span class="menu-icon">✓</span><span>面积检查</span><span class="menu-arrow">⌄</span></div><div class="menu-item">面积检查任务管理<span class="menu-note">待接入</span></div></section></nav></aside>
<main><div class="breadcrumb"><a href="area-survey-outplan-list.html">计划外普查任务管理</a>&nbsp;&nbsp;/&nbsp;&nbsp;任务详情</div><div class="page-heading"><div class="heading-left"><a class="back-link" href="area-survey-outplan-list.html">←</a><div><h1 id="taskTitle">计划外普查任务详情</h1><div class="subtitle">查看任务范围、站点执行进度和操作记录</div></div></div><div class="toolbar-actions" id="headingActions"></div></div>
<section class="card"><div class="card-header"><span class="card-title">基本信息</span><span id="statusTag"></span></div><div class="card-body"><div class="descriptions" id="baseInfo"></div></div></section>
<section class="card"><div class="card-header"><span class="card-title">执行概览</span><span class="toolbar-note">任务来源：计划外</span></div><div class="card-body"><div class="stats" id="stats"></div><div class="table-wrap"><table><thead><tr><th style="width:55px">序号</th><th style="width:130px">站点编码</th><th style="width:180px">站点名称</th><th style="width:80px">来源</th><th style="width:90px">站点类型</th><th style="width:125px">所属管理部</th><th style="width:145px">片区所/办事处</th><th style="width:110px" class="center">执行状态</th><th>用热地址</th><th style="width:90px">操作</th></tr></thead><tbody id="stationBody"></tbody></table></div></div></section>
<section class="card"><div class="card-header"><span class="card-title">操作记录</span><span class="toolbar-note">记录任务创建、编辑、下发和撤回</span></div><div class="card-body"><ul class="timeline" id="timeline"></ul></div></section></main><div class="toast" id="toast"></div>
<script src="area-survey-outplan-data.js"></script><script>
const id=new URLSearchParams(location.search).get('id');let tasks=outPlanLoad(),task=tasks.find(item=>item.id===id);if(!task)location.href='area-survey-outplan-list.html';
function statusForStation(){const map={'未下发':'未下发','待分配':'待分配','进行中':'普查中','所长审核':'所长审核','管理部审核':'管理部审核','已完成':'普查完成','已作废':'已作废'};return map[task.status];}
function childContext(station){const auditMap={'所长审核':'待审核','管理部审核':'待审核','已完成':'通过'};return encodeURIComponent(JSON.stringify({plan:{id:task.id,name:task.name,year:`${task.start.slice(0,4)}年`,type:station.type,status:'创建成功',source:'计划外',reason:outPlanReason(task)},task:{id:`outplan-${task.id}-${station.id}`,status:task.status==='已完成'?'已结束':task.status,auditStatus:auditMap[task.status]||'未上报',updatedAt:task.logs?.[0]?.time||task.createdAt,surveyors:task.status==='待分配'?'待分配':'张三',station:{...station,district:station.address.slice(0,3)},timeline:[]}}));}
function render(){document.getElementById('taskTitle').textContent=task.name;document.getElementById('statusTag').innerHTML=outPlanTag(task.status);const departments=[...new Set(task.stationIds.map(id=>outPlanStation(id,task)?.department).filter(Boolean))],offices=[...new Set(task.stationIds.map(id=>outPlanStation(id,task)?.office).filter(Boolean))];document.getElementById('baseInfo').innerHTML=[['任务编号',task.id],['任务来源','计划外'],['计划外普查原因',outPlanReason(task)],['创建人',task.creator],['开始时间',task.start.replace('T',' ')],['结束时间',task.end.replace('T',' ')],['所属管理部',departments.join('、')],['涉及片区所/办事处',offices.join('、')]].map(([label,value])=>`<div class="desc"><span class="desc-label">${label}</span><span class="desc-value" title="${value}">${value}</span></div>`).join('');const total=task.stationIds.length,done=task.status==='已完成'?total:0,doing=['进行中','所长审核','管理部审核'].includes(task.status)?total:0,pending=total-done-doing;document.getElementById('stats').innerHTML=[['站点总数',total],['待处理',pending],['执行中',doing],['已完成',done]].map(([label,value])=>`<div class="stat"><div class="stat-label">${label}</div><div class="stat-value">${value}<small style="font-size:12px;color:#8c95a6"> 个</small></div></div>`).join('');document.getElementById('stationBody').innerHTML=task.stationIds.map((id,index)=>{const station=outPlanStation(id,task);return `<tr><td>${index+1}</td><td>${station.code||'—'}</td><td>${station.name}</td><td>${station.temporary?'新建':'既有'}</td><td>${station.type}</td><td>${station.department}</td><td>${station.office}</td><td class="center">${outPlanTag(statusForStation())}</td><td title="${station.address}">${station.address}</td><td><a class="link" href="area-survey-task-detail.html?data=${childContext(station)}&source=office">详情</a></td></tr>`}).join('');document.getElementById('timeline').innerHTML=(task.logs||[]).map(log=>`<li><strong>${log.action}</strong><div>${log.detail||'—'}</div><span>${log.operator} · ${log.time}</span></li>`).join('')||'<li><strong>暂无操作记录</strong></li>';renderActions();}
function renderActions(){let html='';if(task.status==='未下发')html=`<a class="btn" href="area-survey-outplan-create.html?id=${encodeURIComponent(task.id)}">编辑</a><button class="btn btn-primary" onclick="dispatchTask()">下发</button>`;if(['待分配','进行中'].includes(task.status))html='<button class="btn" onclick="recallTask()">撤回任务</button>';document.getElementById('headingActions').innerHTML=html;}
function dispatchTask(){const conflicts=task.stationIds.map(stationId=>outPlanConflict(stationId,task.start,task.end,task.id)).filter(Boolean);const message=conflicts.length?`该任务有 ${conflicts.length} 个站点存在时间重叠任务，冲突仅作提示。确认仍要下发吗？`:'确认下发该任务至相关片区所吗？';if(!confirm(message))return;task.status='待分配';task.logs=task.logs||[];task.logs.unshift({action:'下发任务',operator:'业务管理员',time:outPlanNow(),detail:conflicts.length?`确认存在 ${conflicts.length} 个冲突站点后继续下发`:'任务已下发至站点归属片区所'});outPlanSave(tasks);render();outPlanToast('任务下发成功');}
function recallTask(){if(!confirm('撤回后任务将从下游任务列表移除，确认继续吗？'))return;task.status='未下发';task.logs=task.logs||[];task.logs.unshift({action:'撤回任务',operator:'业务管理员',time:outPlanNow(),detail:'任务已撤回，可修改后重新下发'});outPlanSave(tasks);render();outPlanToast('任务已撤回');}
render();
</script></body></html>
